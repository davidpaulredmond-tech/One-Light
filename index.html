<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Light</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
body{font-family:sans-serif;text-align:center;background:#f5f7fa;margin:0;padding:40px}
button{padding:14px 20px;margin:10px;border-radius:12px;border:none;background:#0f172a;color:white;font-size:16px}
#session{display:none}
</style>
</head>
<body>

<h1>One Light</h1>
<p>A daily 5-minute global meditation</p>

<div id="main">
<button onclick="startSession()">Begin 5-Minute Session</button>
</div>

<div id="session">
<h2>Session in progress</h2>
<p id="timer">5:00</p>
<button onclick="stopSession()">End</button>
</div>

<audio id="ocean" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=ocean-waves-ambient-110624.mp3">
</audio>

<script>
let timerInterval;
let time = 300;

function startSession(){
document.getElementById('main').style.display='none';
document.getElementById('session').style.display='block';
document.getElementById('ocean').play();

timerInterval=setInterval(()=>{
time--;
let m=Math.floor(time/60);
let s=time%60;
document.getElementById('timer').innerText=m+":"+String(s).padStart(2,'0');
if(time<=0){stopSession();}
},1000);
}

function stopSession(){
clearInterval(timerInterval);
document.getElementById('ocean').pause();
time=300;
document.getElementById('main').style.display='block';
document.getElementById('session').style.display='none';
}
</script>

</body>
</html>
